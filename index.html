<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Acadêmico — Calculadora de Notas</title>
<link rel="shortcut icon" href="imagens/Academico.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<!-- NOISE OVERLAY -->
<div class="noise-overlay" aria-hidden="true"></div>

<!-- HEADER -->
<header class="site-header" role="banner">
  <div class="header-inner">
    <div class="header-brand">
      <div class="brand-icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-title">Sistema Acadêmico</span>
        <span class="brand-sub">Calculadora de Notas · 2026</span>
      </div>
    </div>
    <button class="theme-btn" id="themeBtn" onclick="toggleDark()" aria-label="Alternar entre tema claro e escuro" title="Alternar tema">
      <i id="themeIcon" class="fas fa-moon" aria-hidden="true"></i>
    </button>
  </div>
</header>

<!-- TOAST -->
<div id="toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
  <i id="toastIcon" class="fas fa-circle-check" aria-hidden="true"></i>
  <span id="toastMsg"></span>
</div>

<main class="main-content" id="main">

  <!-- SEÇÃO: FORMULÁRIO -->
  <section class="card form-card" aria-labelledby="form-title">
    <div class="card-header">
      <div class="card-header-icon accent" aria-hidden="true">
        <i class="fas fa-pen-to-square"></i>
      </div>
      <h2 id="form-title">Nova Consulta</h2>
      <div class="card-header-line" aria-hidden="true"></div>
    </div>

    <div class="form-body">

      <div class="form-row">
        <div class="field">
          <label for="nome">
            <i class="fas fa-user" aria-hidden="true"></i>
            Nome do Aluno
          </label>
          <input
            type="text"
            id="nome"
            placeholder="Ex: João da Silva"
            autocomplete="name"
            aria-describedby="err-nome"
          >
          <span class="field-error" id="err-nome" role="alert" aria-live="polite"></span>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label for="universidade">
            <i class="fas fa-building-columns" aria-hidden="true"></i>
            Tipo de Instituição
          </label>
          <div class="select-wrap">
            <select id="universidade" aria-describedby="err-universidade">
            </select>
            <i class="fas fa-chevron-down select-arrow" aria-hidden="true"></i>
          </div>
        </div>
      </div>

      <div class="form-row" id="row-personalizada" style="display:none">
        <div class="field">
          <label for="mediaPersonalizada">
            <i class="fas fa-sliders" aria-hidden="true"></i>
            Média para Aprovação
          </label>
          <input
            type="number"
            id="mediaPersonalizada"
            placeholder="Ex: 6.5"
            step="0.1" min="0" max="10"
            aria-describedby="err-media-custom"
          >
          <span class="field-error" id="err-media-custom" role="alert" aria-live="polite"></span>
        </div>
      </div>

      <div class="divider" role="separator"><span>Notas</span></div>

      <div class="form-row two-cols">
        <div class="field">
          <label for="n1">
            <i class="fas fa-1" aria-hidden="true"></i>
            Nota 1
          </label>
          <input
            type="number"
            id="n1"
            placeholder="0.0 – 10.0"
            step="0.1" min="0" max="10"
            aria-describedby="err-n1"
          >
          <span class="field-error" id="err-n1" role="alert" aria-live="polite"></span>
        </div>
        <div class="field">
          <label for="n2">
            <i class="fas fa-2" aria-hidden="true"></i>
            Nota 2
          </label>
          <input
            type="number"
            id="n2"
            placeholder="0.0 – 10.0"
            step="0.1" min="0" max="10"
            aria-describedby="err-n2"
          >
          <span class="field-error" id="err-n2" role="alert" aria-live="polite"></span>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label for="nfinal">
            <i class="fas fa-file-pen" aria-hidden="true"></i>
            Exame Final / Recuperação
            <span class="label-opt">(opcional)</span>
          </label>
          <input
            type="number"
            id="nfinal"
            placeholder="Deixe em branco se ainda não realizou"
            step="0.1" min="0" max="10"
          >
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" id="btnCalcular" onclick="calcular()" type="button">
          <i class="fas fa-calculator" aria-hidden="true"></i>
          <span>Calcular</span>
        </button>
        <button class="btn btn-outline" onclick="limparFormulario()" type="button" aria-label="Limpar formulário">
          <i class="fas fa-rotate-left" aria-hidden="true"></i>
          <span>Limpar</span>
        </button>
      </div>

    </div>
  </section>

  <!-- SEÇÃO: RESULTADO -->
  <section class="card result-card" id="result-card" style="display:none" aria-labelledby="result-title" aria-live="polite">
    <div class="card-header">
      <div class="card-header-icon gold" aria-hidden="true">
        <i class="fas fa-chart-bar"></i>
      </div>
      <h2 id="result-title">Resultado</h2>
      <div class="card-header-line gold" aria-hidden="true"></div>
    </div>

    <div class="result-body">
      <div id="veredicto" class="veredicto" role="status"></div>
      <div class="result-details" id="result-details"></div>

      <div class="progress-section" id="progress-section">
        <div class="progress-header">
          <span class="progress-label-text">Média obtida</span>
          <span id="progress-valor" class="progress-valor"></span>
        </div>
        <div class="progress-bar-track" role="progressbar" aria-valuemin="0" aria-valuemax="10" id="progressTrack">
          <div class="progress-bar-fill" id="progress-bar"></div>
          <div class="progress-marker" id="progress-marker"></div>
        </div>
        <div class="progress-legend" aria-hidden="true">
          <span>0</span>
          <span id="progress-exigida-label"></span>
          <span>10</span>
        </div>
      </div>

      <button class="btn btn-pdf" onclick="gerarPDF()" type="button">
        <i class="fas fa-file-pdf" aria-hidden="true"></i>
        <span>Gerar Boletim PDF</span>
      </button>
    </div>
  </section>

  <!-- SEÇÃO: HISTÓRICO -->
  <section class="card summary-card" aria-labelledby="hist-title">
    <div class="card-header">
      <div class="card-header-icon muted" aria-hidden="true">
        <i class="fas fa-clock-rotate-left"></i>
      </div>
      <h2 id="hist-title">Histórico</h2>
      <button class="btn-clear-hist" onclick="limparHistorico()" title="Limpar histórico" aria-label="Limpar todo o histórico">
        <i class="fas fa-trash" aria-hidden="true"></i>
      </button>
    </div>
    <div id="historico" class="historico-lista" aria-live="polite">
      <div class="empty-state">
        <div class="empty-icon" aria-hidden="true"><i class="fas fa-book-open"></i></div>
        <p>Nenhum cálculo realizado ainda.</p>
        <small>Preencha o formulário e clique em Calcular.</small>
      </div>
    </div>
  </section>

</main>

<footer class="site-footer" role="contentinfo">
  <p>Sistema Acadêmico © 2026 — Desenvolvido por <a href="https://github.com/Augusto-dev0" target="_blank" rel="noopener noreferrer">Luiz Augusto</a></p>
</footer>

<script src="script.js"></script>
</body>
</html>
